version: "3.8"

services:
  # Service VPN Gluetun
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "8080:8080"  # Port pour qBittorrent WebUI
      - "6881:6881"  # Port pour qBittorrent (TCP)
      - "6881:6881/udp"  # Port pour qBittorrent (UDP)
    environment:
      # Configuration VPN - À adapter selon votre fournisseur
      - VPN_SERVICE_PROVIDER=your_vpn_provider  # ex: nordvpn, expressvpn, etc.
      - VPN_TYPE=openvpn  # ou wireguard
      # Ajoutez vos credentials et configuration VPN ici
      # - OPENVPN_USER=your_username
      # - OPENVPN_PASSWORD=your_password
      # - SERVER_COUNTRIES=France
      - TZ=Europe/Paris
    volumes:
      - ./gluetun:/gluetun
    restart: unless-stopped
    networks:
      - vpn_network

  # Service qBittorrent
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "service:gluetun"  # Partage le réseau de gluetun
    depends_on:
      - gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      - WEBUI_PORT=8080
    volumes:
      - ./qbittorrent/config:/config
      - ./qbittorrent/downloads:/downloads
    restart: unless-stopped

  # Service de monitoring
  monitor:
    build:
      context: .
      dockerfile: Dockerfile.monitor
    container_name: monitor_vpn
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Accès au socket Docker (lecture seule)
      - ./logs:/var/log  # Persistance des logs
    environment:
      - GLUETUN_CONTAINER=gluetun
      - QBITTORRENT_CONTAINER=qbittorrent
      - CHECK_INTERVAL=30  # Intervalle de vérification en secondes
      - TZ=Europe/Paris
    depends_on:
      - gluetun
      - qbittorrent
    restart: unless-stopped
    networks:
      - vpn_network

networks:
  vpn_network:
    driver: bridge
